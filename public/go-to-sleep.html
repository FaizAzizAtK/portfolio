<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>dot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #07080f; overflow: hidden; touch-action: none; font-family: -apple-system, sans-serif; }
    canvas { display: block; }

    #joystick {
      position: fixed; bottom: 3rem; left: 50%; transform: translateX(-50%);
      width: 130px; height: 130px; z-index: 10;
    }
    #joy-base {
      position: absolute; inset: 0; border-radius: 50%;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    }
    #joy-thumb {
      position: absolute; width: 46px; height: 46px; border-radius: 50%;
      background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.35);
      top: 50%; left: 50%; transform: translate(-50%,-50%); will-change: transform;
    }

    #quote-wrap {
      position: fixed; top: 2.2rem; left: 50%; transform: translateX(-50%);
      width: min(88vw, 480px); text-align: center; pointer-events: none;
      z-index: 20; opacity: 0; transition: opacity 0.7s ease;
    }
    #quote-text {
      display: block; color: rgba(255,255,255,0.82); font-size: 0.82rem;
      font-style: italic; line-height: 1.55; letter-spacing: 0.01em;
    }
    #quote-author {
      display: block; margin-top: 0.45rem; font-size: 0.58rem;
      letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.35);
    }

    #theme-btn {
      position: fixed; top: 1.4rem; right: 1.4rem; z-index: 20;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 100px; padding: 0.45rem 1rem;
      color: rgba(255,255,255,0.45); font-size: 0.58rem;
      letter-spacing: 0.13em; text-transform: uppercase;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      transition: background 0.2s, color 0.2s;
    }
    #theme-btn:active { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.9); }

    #hint {
      position: fixed; bottom: 1.1rem; left: 50%; transform: translateX(-50%);
      font-size: 0.58rem; letter-spacing: 0.14em; text-transform: uppercase;
      color: rgba(255,255,255,0.16); pointer-events: none; white-space: nowrap;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>

  <div id="quote-wrap">
    <span id="quote-text"></span>
    <span id="quote-author"></span>
  </div>

  <button id="theme-btn">DOTS</button>

  <div id="joystick">
    <div id="joy-base"></div>
    <div id="joy-thumb"></div>
  </div>
  <p id="hint">drag to move</p>

  <script>
  (() => {
    const canvas = document.getElementById('c')
    const ctx    = canvas.getContext('2d')
    const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight }
    resize()
    window.addEventListener('resize', () => { resize(); initParticles() })

    // ── Breaking Bad quotes ────────────────────────────────
    const QUOTES = [
      { t: "I am the one who knocks.",                                      a: "Walter White" },
      { t: "Say my name.",                                                  a: "Walter White" },
      { t: "Yeah, science!",                                                a: "Jesse Pinkman" },
      { t: "I'm not in danger, Skyler. I am the danger.",                   a: "Walter White" },
      { t: "Stay out of my territory.",                                     a: "Walter White" },
      { t: "No more half measures.",                                        a: "Mike Ehrmantraut" },
      { t: "Science, bitch.",                                               a: "Jesse Pinkman" },
      { t: "What's the point of being an outlaw when you got responsibilities?", a: "Jesse Pinkman" },
      { t: "I did it for me. I liked it. I was good at it. And I was really... I was alive.", a: "Walter White" },
      { t: "If you don't know who I am, maybe your best course would be to tread lightly.", a: "Walter White" },
      { t: "Smoking marijuana, eating Cheetos, and masturbating do not constitute plans of action.", a: "Walter White" },
      { t: "You clearly don't know who you're talking to, so let me clue you in.", a: "Walter White" },
      { t: "Yo, I've been thinking... why do we even have a word for something being on fleek?", a: "Jesse Pinkman" },
      { t: "I am not in danger. I am the danger. A guy opens his door and gets shot, and you think that of me? No. I am the one who knocks.", a: "Walter White" },
      { t: "Better call Saul.",                                             a: "Jesse Pinkman" },
      { t: "Wire. You know, like, a wire on a phone, but bigger.",          a: "Jesse Pinkman" },
      { t: "Blood money.",                                                  a: "Hank Schrader" },
      { t: "Run.",                                                          a: "Mike Ehrmantraut" },
      { t: "Yeah, Mr. White! Yeah, science!",                              a: "Jesse Pinkman" },
      { t: "Every life comes with a death sentence.",                       a: "Walter White" },
    ]
    let lastQuoteIdx  = -1
    let quoteVisible  = false
    let quoteCooldown = 0
    let moveStreak    = 0
    const quoteWrap   = document.getElementById('quote-wrap')
    const quoteText   = document.getElementById('quote-text')
    const quoteAuthor = document.getElementById('quote-author')
    let quoteTimeout  = null

    function showQuote() {
      if (quoteVisible || quoteCooldown > 0) return
      let idx
      do { idx = Math.floor(Math.random() * QUOTES.length) } while (idx === lastQuoteIdx)
      lastQuoteIdx = idx
      const q = QUOTES[idx]
      quoteText.textContent   = `"${q.t}"`
      quoteAuthor.textContent = `— ${q.a}`
      quoteWrap.style.opacity = '1'
      quoteVisible = true
      clearTimeout(quoteTimeout)
      quoteTimeout = setTimeout(() => {
        quoteWrap.style.opacity = '0'
        quoteVisible  = false
        quoteCooldown = 220 // ~frames before next can show
      }, 3800)
    }

    // ── Themes ─────────────────────────────────────────────
    const THEMES = ['DOTS', 'STARS', 'CRYSTALS', 'MIXED']
    let themeIdx = 0
    const themeBtn = document.getElementById('theme-btn')
    themeBtn.addEventListener('click', () => {
      themeIdx = (themeIdx + 1) % THEMES.length
      themeBtn.textContent = THEMES[themeIdx]
      assignShapes()
    })
    themeBtn.addEventListener('touchend', e => e.preventDefault())

    // Shape per particle: 0=circle 1=star 2=diamond
    function assignShapes() {
      for (const p of particles) {
        if      (themeIdx === 0) p.shape = 0
        else if (themeIdx === 1) p.shape = 1
        else if (themeIdx === 2) p.shape = 2
        else                     p.shape = Math.floor(Math.random() * 3)
      }
    }

    // ── Particles ──────────────────────────────────────────
    let particles = []
    const PUSH_R = 95, PUSH_F = 5.8, RETURN = 0.036, DAMP = 0.83

    function initParticles() {
      const count = Math.floor((canvas.width * canvas.height) / 5200)
      particles = Array.from({ length: count }, () => {
        const hx = Math.random() * canvas.width
        const hy = Math.random() * canvas.height
        return {
          hx, hy, x: hx, y: hy, vx: 0, vy: 0,
          r:         1.8 + Math.random() * 2.2,
          baseHue:   Math.random() * 360,
          hue:       Math.random() * 360,
          pushed:    0,
          driftA:    Math.random() * Math.PI * 2,
          driftS:    0.003 + Math.random() * 0.004,
          shape:     themeIdx === 3 ? Math.floor(Math.random()*3) : themeIdx,
          spin:      0,
          spinV:     (Math.random() - 0.5) * 0.04,
        }
      })
    }
    initParticles()

    // ── Ripples ────────────────────────────────────────────
    const ripples = []
    function addRipple(x, y, hue) {
      ripples.push({ x, y, r: 0, maxR: PUSH_R * 1.4, alpha: 0.5, hue })
    }

    // ── Player ─────────────────────────────────────────────
    const player = { x: canvas.width/2, y: canvas.height/2, vx:0, vy:0, r:9, hue:200, trail:[] }

    // ── Joystick ───────────────────────────────────────────
    const joyEl   = document.getElementById('joystick')
    const thumbEl = document.getElementById('joy-thumb')
    const JR      = 65
    let joyX=0, joyY=0, touchId=null

    function joyMove(cx, cy) {
      const rect = joyEl.getBoundingClientRect()
      let dx = cx - (rect.left + rect.width/2)
      let dy = cy - (rect.top  + rect.height/2)
      const d = Math.sqrt(dx*dx + dy*dy)
      if (d > JR) { dx=dx/d*JR; dy=dy/d*JR }
      joyX=dx/JR; joyY=dy/JR
      thumbEl.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px))`
    }
    function joyReset() { joyX=0; joyY=0; touchId=null; thumbEl.style.transform='translate(-50%,-50%)' }

    joyEl.addEventListener('touchstart', e => {
      e.preventDefault(); if (touchId!==null) return
      touchId=e.changedTouches[0].identifier; joyMove(e.changedTouches[0].clientX, e.changedTouches[0].clientY)
    }, { passive:false })
    window.addEventListener('touchmove', e => {
      e.preventDefault()
      for (const t of e.changedTouches) if (t.identifier===touchId) joyMove(t.clientX, t.clientY)
    }, { passive:false })
    window.addEventListener('touchend', e => { for (const t of e.changedTouches) if (t.identifier===touchId) joyReset() })

    let mouseDown=false
    joyEl.addEventListener('mousedown', e => { mouseDown=true; joyMove(e.clientX, e.clientY) })
    window.addEventListener('mousemove', e => { if (mouseDown) joyMove(e.clientX, e.clientY) })
    window.addEventListener('mouseup', () => { mouseDown=false; joyReset() })

    // ── Shape drawing ──────────────────────────────────────
    function drawShape(ctx, p, r) {
      ctx.save()
      ctx.translate(p.x, p.y)
      ctx.rotate(p.spin)
      if (p.shape === 0) {               // circle
        ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2); ctx.fill()
      } else if (p.shape === 1) {        // 5-pointed star
        ctx.beginPath()
        for (let i=0; i<10; i++) {
          const a = (i * Math.PI/5) - Math.PI/2
          const rr = i%2===0 ? r : r*0.42
          i===0 ? ctx.moveTo(Math.cos(a)*rr, Math.sin(a)*rr)
                : ctx.lineTo(Math.cos(a)*rr, Math.sin(a)*rr)
        }
        ctx.closePath(); ctx.fill()
      } else {                           // diamond / rotated square
        ctx.beginPath()
        ctx.moveTo(0, -r); ctx.lineTo(r*0.75, 0)
        ctx.lineTo(0, r);  ctx.lineTo(-r*0.75, 0)
        ctx.closePath(); ctx.fill()
      }
      ctx.restore()
    }

    // ── Update ─────────────────────────────────────────────
    let rippleTimer = 0

    function update() {
      player.vx = player.vx*0.89 + joyX*4.5*0.28
      player.vy = player.vy*0.89 + joyY*4.5*0.28
      player.x  = Math.max(player.r, Math.min(canvas.width -player.r, player.x+player.vx))
      player.y  = Math.max(player.r, Math.min(canvas.height-player.r, player.y+player.vy))
      player.hue = (player.hue + 0.7) % 360

      player.trail.unshift({ x:player.x, y:player.y, hue:player.hue })
      if (player.trail.length > 32) player.trail.pop()

      const speed = Math.sqrt(player.vx*player.vx + player.vy*player.vy)

      // Quote trigger
      if (quoteCooldown > 0) quoteCooldown--
      if (speed > 0.9) {
        moveStreak++
        if (moveStreak === 90) showQuote() // ~1.5s of movement
      } else {
        moveStreak = 0
      }

      // Emit ripple every so often while moving fast
      rippleTimer++
      if (speed > 2.5 && rippleTimer % 18 === 0) addRipple(player.x, player.y, player.hue)

      // Update ripples
      for (let i = ripples.length-1; i >= 0; i--) {
        const rp = ripples[i]
        rp.r     += (rp.maxR - rp.r) * 0.09
        rp.alpha *= 0.91
        if (rp.alpha < 0.01) ripples.splice(i, 1)
      }

      // Particles
      for (const p of particles) {
        p.driftA += p.driftS
        const idleX = Math.sin(p.driftA) * 0.1
        const idleY = Math.cos(p.driftA*0.7) * 0.1

        const dx = p.x - player.x, dy = p.y - player.y
        const dist = Math.sqrt(dx*dx + dy*dy)

        if (dist < PUSH_R && dist > 0) {
          const force = Math.pow(1 - dist/PUSH_R, 1.5) * PUSH_F
          p.vx += (dx/dist)*force; p.vy += (dy/dist)*force
          p.pushed = Math.min(1, p.pushed + 0.14)
          // Spin when pushed
          p.spinV += (Math.random()-0.5) * 0.02
        } else {
          p.pushed = Math.max(0, p.pushed - 0.022)
        }

        p.vx += (p.hx-p.x)*RETURN + idleX
        p.vy += (p.hy-p.y)*RETURN + idleY
        p.vx *= DAMP; p.vy *= DAMP
        p.x += p.vx; p.y += p.vy

        p.spin  += p.spinV
        p.spinV *= 0.97

        if (p.pushed > 0.02)  p.hue += (player.hue - p.hue) * p.pushed * 0.1
        else                   p.hue += (p.baseHue  - p.hue) * 0.03
      }
    }

    // ── Draw ───────────────────────────────────────────────
    function draw() {
      ctx.fillStyle = 'rgba(7,8,15,0.28)'
      ctx.fillRect(0, 0, canvas.width, canvas.height)

      // Ripples
      for (const rp of ripples) {
        ctx.beginPath()
        ctx.arc(rp.x, rp.y, rp.r, 0, Math.PI*2)
        ctx.strokeStyle = `hsla(${rp.hue},80%,65%,${rp.alpha})`
        ctx.lineWidth = 1.2
        ctx.stroke()
      }

      // Particles
      for (const p of particles) {
        const r   = p.r * (1 + p.pushed * 0.8)
        const sat = p.pushed > 0.01 ? 65+p.pushed*35 : 18
        const lit = p.pushed > 0.01 ? 58+p.pushed*25 : 52
        const a   = 0.42 + p.pushed*0.45

        if (p.pushed > 0.06) {
          const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, r*3.2)
          g.addColorStop(0,   `hsla(${p.hue},${sat}%,${lit}%,${a*0.7})`)
          g.addColorStop(0.5, `hsla(${p.hue},${sat}%,${lit}%,${a*0.2})`)
          g.addColorStop(1,   `hsla(${p.hue},${sat}%,${lit}%,0)`)
          ctx.beginPath(); ctx.arc(p.x, p.y, r*3.2, 0, Math.PI*2)
          ctx.fillStyle = g; ctx.fill()
        }

        ctx.fillStyle = `hsla(${p.hue},${sat}%,${lit}%,${a})`
        drawShape(ctx, p, r)
      }

      // Player trail
      for (let i=1; i<player.trail.length; i++) {
        const t   = player.trail[i]
        const pct = 1 - i/player.trail.length
        ctx.beginPath(); ctx.arc(t.x, t.y, player.r*pct*0.7, 0, Math.PI*2)
        ctx.fillStyle = `hsla(${t.hue},85%,72%,${pct*0.42})`; ctx.fill()
      }

      // Player glow
      const og = ctx.createRadialGradient(player.x, player.y, 0, player.x, player.y, player.r*4.5)
      og.addColorStop(0,   `hsla(${player.hue},90%,78%,0.4)`)
      og.addColorStop(0.5, `hsla(${player.hue},90%,65%,0.1)`)
      og.addColorStop(1,   `hsla(${player.hue},90%,60%,0)`)
      ctx.beginPath(); ctx.arc(player.x, player.y, player.r*4.5, 0, Math.PI*2)
      ctx.fillStyle = og; ctx.fill()

      // Player core with chromatic fringe
      ctx.beginPath(); ctx.arc(player.x+1, player.y, player.r*0.7, 0, Math.PI*2)
      ctx.fillStyle = `hsla(${(player.hue+30)%360},90%,80%,0.35)`; ctx.fill()
      ctx.beginPath(); ctx.arc(player.x-1, player.y, player.r*0.7, 0, Math.PI*2)
      ctx.fillStyle = `hsla(${(player.hue-30+360)%360},90%,80%,0.35)`; ctx.fill()
      ctx.beginPath(); ctx.arc(player.x, player.y, player.r, 0, Math.PI*2)
      ctx.fillStyle = `hsl(${player.hue},80%,85%)`; ctx.fill()
    }

    function loop() { update(); draw(); requestAnimationFrame(loop) }
    loop()
  })()
  </script>
</body>
</html>
