<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>dot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #07080f;
      overflow: hidden;
      touch-action: none;
      font-family: -apple-system, sans-serif;
    }
    canvas { display: block; }

    #joystick {
      position: fixed;
      bottom: 3rem;
      left: 50%;
      transform: translateX(-50%);
      width: 130px;
      height: 130px;
      z-index: 10;
    }
    #joy-base {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
    }
    #joy-thumb {
      position: absolute;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.35);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      will-change: transform;
    }
    #hint {
      position: fixed;
      bottom: 1.2rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.6rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.18);
      pointer-events: none;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="joystick">
    <div id="joy-base"></div>
    <div id="joy-thumb"></div>
  </div>
  <p id="hint">drag the circle</p>

  <script>
  (() => {
    const canvas = document.getElementById('c')
    const ctx    = canvas.getContext('2d')

    const W = () => canvas.width  = window.innerWidth
    const H = () => canvas.height = window.innerHeight
    W(); H()
    window.addEventListener('resize', () => { W(); H(); initParticles() })

    // ── Particles ──────────────────────────────────────────
    let particles = []
    const PUSH_R   = 90
    const PUSH_F   = 5.5
    const RETURN   = 0.038
    const DAMP     = 0.84

    function initParticles() {
      const count = Math.floor((canvas.width * canvas.height) / 5800)
      particles = Array.from({ length: count }, () => {
        const hx = Math.random() * canvas.width
        const hy = Math.random() * canvas.height
        return {
          hx, hy,
          x: hx, y: hy,
          vx: 0, vy: 0,
          r: 1.5 + Math.random() * 2,
          baseHue: Math.random() * 360,
          hue: Math.random() * 360,
          pushed: 0,
          // subtle idle drift
          driftAngle: Math.random() * Math.PI * 2,
          driftSpeed: 0.003 + Math.random() * 0.004,
        }
      })
    }
    initParticles()

    // ── Player ─────────────────────────────────────────────
    const player = {
      x: canvas.width  / 2,
      y: canvas.height / 2,
      vx: 0, vy: 0,
      r: 9,
      hue: 200,
      trail: [],
    }

    // ── Joystick ───────────────────────────────────────────
    const joyEl   = document.getElementById('joystick')
    const thumbEl = document.getElementById('joy-thumb')
    const JR      = 65 // max thumb travel radius
    let joyX = 0, joyY = 0, touchId = null

    function joyMove(cx, cy) {
      const rect = joyEl.getBoundingClientRect()
      const ox = rect.left + rect.width  / 2
      const oy = rect.top  + rect.height / 2
      let dx = cx - ox, dy = cy - oy
      const d = Math.sqrt(dx*dx + dy*dy)
      if (d > JR) { dx = dx/d*JR; dy = dy/d*JR }
      joyX = dx / JR; joyY = dy / JR
      thumbEl.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`
    }
    function joyReset() {
      joyX = 0; joyY = 0; touchId = null
      thumbEl.style.transform = 'translate(-50%,-50%)'
    }

    joyEl.addEventListener('touchstart', e => {
      e.preventDefault()
      if (touchId !== null) return
      touchId = e.changedTouches[0].identifier
      joyMove(e.changedTouches[0].clientX, e.changedTouches[0].clientY)
    }, { passive: false })

    window.addEventListener('touchmove', e => {
      e.preventDefault()
      for (const t of e.changedTouches)
        if (t.identifier === touchId) joyMove(t.clientX, t.clientY)
    }, { passive: false })

    window.addEventListener('touchend', e => {
      for (const t of e.changedTouches)
        if (t.identifier === touchId) joyReset()
    })

    // Mouse fallback (desktop)
    let mouseDown = false
    joyEl.addEventListener('mousedown', e => { mouseDown = true; joyMove(e.clientX, e.clientY) })
    window.addEventListener('mousemove', e => { if (mouseDown) joyMove(e.clientX, e.clientY) })
    window.addEventListener('mouseup',   () => { mouseDown = false; joyReset() })

    // ── Update ─────────────────────────────────────────────
    const FRICTION = 0.89
    const SPEED    = 4.5

    function update() {
      // Player
      player.vx = player.vx * FRICTION + joyX * SPEED * 0.28
      player.vy = player.vy * FRICTION + joyY * SPEED * 0.28
      player.x  = Math.max(player.r, Math.min(canvas.width  - player.r, player.x + player.vx))
      player.y  = Math.max(player.r, Math.min(canvas.height - player.r, player.y + player.vy))
      player.hue = (player.hue + 0.6) % 360

      // Trail
      player.trail.unshift({ x: player.x, y: player.y, hue: player.hue })
      if (player.trail.length > 28) player.trail.pop()

      // Particles
      for (const p of particles) {
        // Idle breathe
        p.driftAngle += p.driftSpeed
        const idleX = Math.sin(p.driftAngle) * 0.12
        const idleY = Math.cos(p.driftAngle * 0.7) * 0.12

        const dx   = p.x - player.x
        const dy   = p.y - player.y
        const dist = Math.sqrt(dx*dx + dy*dy)

        if (dist < PUSH_R && dist > 0) {
          const force = Math.pow(1 - dist/PUSH_R, 1.6) * PUSH_F
          p.vx += (dx/dist) * force
          p.vy += (dy/dist) * force
          p.pushed = Math.min(1, p.pushed + 0.12)
        } else {
          p.pushed = Math.max(0, p.pushed - 0.025)
        }

        // Spring back home + idle
        p.vx += (p.hx - p.x) * RETURN + idleX
        p.vy += (p.hy - p.y) * RETURN + idleY
        p.vx *= DAMP
        p.vy *= DAMP
        p.x  += p.vx
        p.y  += p.vy

        // Hue: drift toward player hue when pushed, drift back to base otherwise
        if (p.pushed > 0.02) {
          p.hue += (player.hue - p.hue) * p.pushed * 0.08
        } else {
          p.hue += (p.baseHue - p.hue) * 0.03
        }
      }
    }

    // ── Draw ───────────────────────────────────────────────
    function draw() {
      // Motion blur style fade
      ctx.fillStyle = 'rgba(7, 8, 15, 0.3)'
      ctx.fillRect(0, 0, canvas.width, canvas.height)

      // Particles
      for (const p of particles) {
        const r   = p.r * (1 + p.pushed * 0.7)
        const sat = p.pushed > 0.01 ? 65 + p.pushed * 30 : 20
        const lit = p.pushed > 0.01 ? 60 + p.pushed * 20 : 55
        const a   = 0.45 + p.pushed * 0.4

        if (p.pushed > 0.05) {
          // Soft glow ring when pushed
          const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, r * 2.8)
          g.addColorStop(0,   `hsla(${p.hue},${sat}%,${lit}%,${a})`)
          g.addColorStop(0.5, `hsla(${p.hue},${sat}%,${lit}%,${a * 0.4})`)
          g.addColorStop(1,   `hsla(${p.hue},${sat}%,${lit}%,0)`)
          ctx.beginPath()
          ctx.arc(p.x, p.y, r * 2.8, 0, Math.PI * 2)
          ctx.fillStyle = g
          ctx.fill()
        }

        ctx.beginPath()
        ctx.arc(p.x, p.y, r, 0, Math.PI * 2)
        ctx.fillStyle = `hsla(${p.hue},${sat}%,${lit}%,${a})`
        ctx.fill()
      }

      // Player trail
      for (let i = 1; i < player.trail.length; i++) {
        const t   = player.trail[i]
        const pct = 1 - i / player.trail.length
        ctx.beginPath()
        ctx.arc(t.x, t.y, player.r * pct * 0.75, 0, Math.PI * 2)
        ctx.fillStyle = `hsla(${t.hue}, 85%, 72%, ${pct * 0.45})`
        ctx.fill()
      }

      // Player outer glow
      const og = ctx.createRadialGradient(player.x, player.y, 0, player.x, player.y, player.r * 4)
      og.addColorStop(0,   `hsla(${player.hue}, 90%, 75%, 0.35)`)
      og.addColorStop(0.5, `hsla(${player.hue}, 90%, 65%, 0.1)`)
      og.addColorStop(1,   `hsla(${player.hue}, 90%, 60%, 0)`)
      ctx.beginPath()
      ctx.arc(player.x, player.y, player.r * 4, 0, Math.PI * 2)
      ctx.fillStyle = og
      ctx.fill()

      // Player core
      ctx.beginPath()
      ctx.arc(player.x, player.y, player.r, 0, Math.PI * 2)
      ctx.fillStyle = `hsl(${player.hue}, 80%, 82%)`
      ctx.fill()
    }

    // ── Loop ───────────────────────────────────────────────
    function loop() {
      update()
      draw()
      requestAnimationFrame(loop)
    }
    loop()
  })()
  </script>
</body>
</html>
